name: Android Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      # Signing secrets are exposed ONLY as environment variables (never printed).
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK Platform 35 and Build Tools 35.0.0
        run: |
          sdkmanager "platforms;android-35" "build-tools;35.0.0" "platform-tools"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', 'gradle/libs.versions.toml') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Decode release keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          # Decode the PKCS12 keystore into a temporary file outside the repo.
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/mealora-release.p12"
          # Expose only the path via GITHUB_ENV (no secret material is echoed).
          echo "ANDROID_KEYSTORE_FILE=$RUNNER_TEMP/mealora-release.p12" >> "$GITHUB_ENV"

      - name: Ensure Gradle wrapper JAR exists
        run: |
          # The binary gradle-wrapper.jar is intentionally not committed. Generate
          # it here with a bootstrap Gradle so ./gradlew works. (Android Studio does
          # the same automatically on first sync for local development.)
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            curl -sSL "https://services.gradle.org/distributions/gradle-8.9-bin.zip" -o /tmp/gradle.zip
            unzip -q /tmp/gradle.zip -d /tmp
            /tmp/gradle-8.9/bin/gradle wrapper --gradle-version 8.9 --distribution-type bin
          fi

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build signed release APK
        run: ./gradlew :app:assembleRelease --no-daemon --stacktrace

      - name: Build signed release AAB
        run: ./gradlew :app:bundleRelease --no-daemon --stacktrace

      - name: Locate release APK
        id: locate
        run: |
          APK_PATH="$(find app/build/outputs/apk/release -name '*.apk' | head -n 1)"
          if [ -z "$APK_PATH" ]; then
            echo "No release APK found." >&2
            exit 1
          fi
          echo "apk_path=$APK_PATH" >> "$GITHUB_OUTPUT"
          AAB_PATH="$(find app/build/outputs/bundle/release -name '*.aab' | head -n 1)"
          echo "aab_path=$AAB_PATH" >> "$GITHUB_OUTPUT"

      - name: Verify APK signature and certificate
        run: |
          BUILD_TOOLS_DIR="$(ls -d $ANDROID_HOME/build-tools/35.0.0)"
          APKSIGNER="$BUILD_TOOLS_DIR/apksigner"
          echo "Verifying: ${{ steps.locate.outputs.apk_path }}"
          CERT_OUTPUT="$($APKSIGNER verify --print-certs "${{ steps.locate.outputs.apk_path }}")"
          echo "$CERT_OUTPUT"
          # Fail if the artifact was signed with the Android debug key.
          if echo "$CERT_OUTPUT" | grep -q "CN=Android Debug"; then
            echo "ERROR: Release artifact is signed with the Android debug key." >&2
            exit 1
          fi

      - name: Upload signed APK (test artifact)
        uses: actions/upload-artifact@v4
        with:
          name: mealora-plan-release-apk
          path: ${{ steps.locate.outputs.apk_path }}
          if-no-files-found: error

      - name: Upload signed AAB (Google Play artifact)
        uses: actions/upload-artifact@v4
        with:
          name: mealora-plan-release-aab
          path: ${{ steps.locate.outputs.aab_path }}
          if-no-files-found: error
